<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tda_45 | Gelişmiş Erişim</title>
    <style>
        :root {
            --primary: #ff1100;
            --bg: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: none; /* Özel imleç için */
        }

        /* Arka plandaki akan kodlar */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        /* Özel İmleç */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Glitch Efekti ve Görsel */
        #badge {
            max-width: 80%;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: glitch 3s infinite;
            cursor: none;
            position: relative;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            2% { transform: translate(-5px, 2px); filter: hue-rotate(90deg); }
            4% { transform: translate(5px, -2px); filter: hue-rotate(180deg); }
            6% { transform: translate(0); filter: none; }
            100% { transform: translate(0); }
        }

        /* Alt Yazı ve Terminal Efekti */
        .terminal-text {
            margin-top: 20px;
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .terminal-text::after {
            content: "_";
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Tıklama Dalgalanması */
        .ripple {
            position: absolute;
            border: 2px solid var(--primary);
            border-radius: 50%;
            pointer-events: none;
            animation: ripple-effect 0.6s linear;
        }

        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="cursor"></div>

    <div class="container">
        <img id="badge" src="https://img.shields.io/badge/%C3%87OK%20YAKINDA%20Tda_45%20Ana%20Sitesi%20A%C3%A7%C4%B1lacak-ff1100" alt="Tda_45">
        <div class="terminal-text" id="typewriter">Bağlantı Kuruluyor...</div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const badge = document.getElementById('badge');

        // 1. Matrix Arka Plan Efekti
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const alphabet = "TDA45-SYSTEM-ACTIVE-LOADING-0101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff1100";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // 2. Özel İmleç Takibi
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // 3. Tipografi (Daktilo) Efekti
        const textElement = document.getElementById('typewriter');
        const phrases = ["Sistem Hazırlanıyor...", "Veritabanı Senkronize Ediliyor...", "Tda_45 Protokolü Beklemede..."];
        let count = 0;
        let charIndex = 0;

        function type() {
            if (charIndex < phrases[count].length) {
                textElement.textContent += phrases[count].charAt(charIndex);
                charIndex++;
                setTimeout(type, 100);
            } else {
                setTimeout(erase, 2000);
            }
        }

        function erase() {
            if (charIndex > 0) {
                textElement.textContent = phrases[count].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 50);
            } else {
                count = (count + 1) % phrases.length;
                setTimeout(type, 500);
            }
        }
        textElement.textContent = "";
        type();

        // 4. Tıklama Efekti (Görsel ve Ses)
        badge.addEventListener('mousedown', () => {
            cursor.style.width = '40px';
            cursor.style.height = '40px';
            
            // Basit bir "bip" sesi simülasyonu
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        });

        badge.addEventListener('mouseup', () => {
            cursor.style.width = '20px';
            cursor.style.height = '20px';
        });

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
