<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tda_45 - Çok Yakında</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: sans-serif;
            overflow: hidden;
        }

        #badge {
            max-width: 90%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            /* İlk başta görünmez yapıyoruz (JS ile açılacak) */
            opacity: 0;
            transition: all 0.8s ease-in-out;
            transform: scale(0.8);
        }

        /* Tıklandığında çalışacak efekt */
        .click-effect {
            filter: brightness(2) drop-shadow(0 0 15px #ff1100) !important;
            transform: scale(1.1) !important;
        }
    </style>
</head>
<body>

    <img id="badge" 
         src="https://img.shields.io/badge/%C3%87OK%20YAKINDA%20Tda_45%20Ana%20Sitesi%20A%C3%A7%C4%B1lacak-ff1100" 
         alt="Çok Yakında"
         onclick="animateBadge()">

    <script>
        // Sayfa açıldığında görseli otomatik olarak göster
        const el = document.getElementById('badge');
        
        window.onload = function() {
            el.style.opacity = "1";
            el.style.transform = "scale(1)";
            console.log("JavaScript başarıyla çalıştı!");
        };

        // Görsele tıklandığında çalışacak fonksiyon
        function animateBadge() {
            el.classList.add('click-effect');
            
            // 300ms sonra efekti eski haline döndür
            setTimeout(() => {
                el.classList.remove('click-effect');
            }, 300);
            
            alert("Tda_45 Sitesi Çok Yakında Açılıyor!");
        }
    </script>

</body>
</html>
