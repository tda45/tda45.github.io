<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Runner Offline - tda_45</title>
    <style>
        /* Offline fallback font */
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0505 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            color: #ff4444;
        }

        .game-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(139, 0, 0, 0.5); }
            to { text-shadow: 0 0 30px rgba(255, 68, 68, 0.8), 0 0 40px rgba(255, 68, 68, 0.6); }
        }

        .game-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat-item {
            background: rgba(139, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #8b0000;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.3);
        }

        #gameCanvas {
            border: 2px solid #ff4444;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
            background: #000;
        }

        .game-controls {
            margin-top: 20px;
            text-align: center;
            color: #cccccc;
        }

        .control-btn {
            background: rgba(139, 0, 0, 0.3);
            color: #ff6666;
            border: 1px solid #8b0000;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .control-btn:hover {
            background: rgba(139, 0, 0, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.3);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff4444;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            color: #ffffff;
            display: none;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #cccccc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            background: rgba(139, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 5px;
            border: 1px solid #8b0000;
        }

        .back-link:hover {
            color: #ff4444;
            background: rgba(139, 0, 0, 0.5);
        }

        .offline-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 165, 0, 0.2);
            color: #ffa500;
            padding: 8px 16px;
            border-radius: 5px;
            border: 1px solid #ffa500;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Achievement Panel Styles */
        #achievement-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .achievement-toggle {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .achievement-toggle:hover {
            background: rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        .achievement-list {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            min-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 5px;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .achievement-item.unlocked {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .achievement-item.locked {
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid rgba(128, 128, 128, 0.3);
            opacity: 0.7;
        }

        .achievement-icon {
            font-size: 1.5rem;
            margin-right: 10px;
            width: 30px;
            text-align: center;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .achievement-description {
            font-size: 0.8rem;
            color: #cccccc;
        }

        .achievement-status {
            font-size: 1.2rem;
            margin-left: 10px;
        }

        /* Achievement Notification */
        .achievement-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.9), rgba(255, 140, 0, 0.9));
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .achievement-notification.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .achievement-content {
            display: flex;
            align-items: center;
            color: #ffffff;
        }

        .achievement-icon {
            font-size: 2rem;
            margin-right: 15px;
        }

        .achievement-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #ffd700;
        }

        .achievement-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .achievement-description {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-header h1 {
                font-size: 2rem;
            }
            
            .game-stats {
                gap: 15px;
                font-size: 1rem;
            }
            
            .stat-item {
                padding: 8px 15px;
            }
            
            #gameCanvas {
                max-width: 100%;
                height: auto;
            }

            #achievement-panel {
                top: auto;
                bottom: 20px;
                right: 10px;
            }

            .achievement-list {
                max-height: 300px;
                min-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-indicator">📴 OFFLINE MODE</div>
    <a href="index.html" class="back-link">← Ana Sayfa</a>
    
    <div class="game-container">
        <div class="game-header">
            <h1>🔴 Red Runner Offline</h1>
            <p>Boşluk tuşu ile zıpla! Engelere çarpmaktan kaçın!</p>
            <p style="color: #ffa500; font-size: 0.9rem;">İnternet bağlantısı olmadan çalışıyor</p>
        </div>
        
        <div class="game-stats">
            <div class="stat-item">Skor: <span id="score">0</span></div>
            <div class="stat-item">En Yüksek: <span id="highScore">0</span></div>
            <div class="stat-item">Hız: <span id="speed">1.0</span>x</div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="game-controls">
            <button class="control-btn" id="startBtn">Oyunu Başlat</button>
            <button class="control-btn" id="pauseBtn">Durdur</button>
            <button class="control-btn" id="resetBtn">Sıfırla</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>Oyun Bitti!</h2>
            <p>Skorunuz: <span id="finalScore">0</span></p>
            <button class="control-btn" id="restartBtn">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        // Offline Red Runner Game - Simplified Version
        class OfflinePlayer {
            constructor(canvasWidth, canvasHeight) {
                this.x = 100;
                this.y = canvasHeight - 90;
                this.width = 40;
                this.height = 40;
                this.velocityY = 0;
                this.jumping = false;
                this.color = '#ff4444';
                this.gameActive = true;
                this.trail = [];
                this.animationFrame = 0;
            }

            jump(soundManager) {
                if (!this.jumping && this.gameActive) {
                    this.velocityY = -12;
                    this.jumping = true;
                    this.createJumpParticles();
                    if (soundManager) {
                        soundManager.play('jump');
                    }
                }
            }

            createJumpParticles() {
                for (let i = 0; i < 10; i++) {
                    this.trail.push({
                        x: this.x + this.width / 2,
                        y: this.y + this.height,
                        vx: (Math.random() - 0.5) * 4,
                        vy: Math.random() * 2 + 1,
                        life: 1.0,
                        color: `hsl(${Math.random() * 60}, 100%, 50%)`
                    });
                }
            }

            update(gravity, canvasHeight) {
                this.velocityY += gravity;
                this.y += this.velocityY;
                this.animationFrame++;

                // Update trail
                this.trail = this.trail.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    return p.life > 0;
                });

                // Ground collision
                if (this.y >= canvasHeight - this.height - 50) {
                    this.y = canvasHeight - this.height - 50;
                    this.velocityY = 0;
                    this.jumping = false;
                }
            }

            draw(ctx) {
                // Draw trail
                this.trail.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 4, 4);
                });
                ctx.globalAlpha = 1;

                // Draw player with glow
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;

                // Draw eyes
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x + 8, this.y + 10, 8, 8);
                ctx.fillRect(this.x + 24, this.y + 10, 8, 8);
                
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x + 10, this.y + 12, 4, 4);
                ctx.fillRect(this.x + 26, this.y + 12, 4, 4);
            }

            setGameActive(active) {
                this.gameActive = active;
            }
        }

        class OfflineObstacle {
            constructor(canvasWidth, canvasHeight, speed) {
                this.width = 30 + Math.random() * 30;
                this.height = 40 + Math.random() * 40;
                this.x = canvasWidth;
                this.y = canvasHeight - this.height - 50;
                this.speed = speed;
                this.color = '#8b0000';
                this.animationFrame = 0;
            }

            update() {
                this.x -= this.speed;
                this.animationFrame++;
            }

            draw(ctx) {
                // Draw obstacle with gradient
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                gradient.addColorStop(0, '#ff6666');
                gradient.addColorStop(1, this.color);
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Draw spikes on top
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width / 2, this.y - 10);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.closePath();
                ctx.fill();
            }

            isOffScreen() {
                return this.x + this.width < 0;
            }
        }

        class OfflineBackground {
            constructor(canvasWidth, canvasHeight) {
                this.stars = [];
                this.groundOffset = 0;
                
                // Create stars
                for (let i = 0; i < 100; i++) {
                    this.stars.push({
                        x: Math.random() * canvasWidth,
                        y: Math.random() * (canvasHeight - 100),
                        size: Math.random() * 2,
                        speed: Math.random() * 0.5 + 0.1,
                        twinkle: Math.random() * Math.PI * 2
                    });
                }
            }

            update(gameSpeed) {
                // Update stars
                this.stars.forEach(star => {
                    star.x -= star.speed * (gameSpeed / 5);
                    star.twinkle += 0.1;
                    
                    if (star.x < 0) {
                        star.x = 800;
                        star.y = Math.random() * 350;
                    }
                });
                
                // Update ground
                this.groundOffset -= gameSpeed;
                if (this.groundOffset <= -40) {
                    this.groundOffset = 0;
                }
            }

            draw(ctx, canvasWidth, canvasHeight) {
                // Draw gradient background
                const gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
                gradient.addColorStop(0, '#000011');
                gradient.addColorStop(0.5, '#1a0505');
                gradient.addColorStop(1, '#2a0a0a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                
                // Draw stars
                ctx.fillStyle = '#ffffff';
                this.stars.forEach(star => {
                    const twinkle = Math.sin(star.twinkle) * 0.5 + 0.5;
                    ctx.globalAlpha = twinkle * (star.size / 2);
                    ctx.fillRect(star.x, star.y, star.size, star.size);
                });
                ctx.globalAlpha = 1;
            }
        }

        // Sound System
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.sounds = {};
                this.enabled = true;
                this.initAudio();
            }

            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.createSounds();
                } catch (e) {
                    console.log('Audio not supported');
                    this.enabled = false;
                }
            }

            createSounds() {
                // Jump sound
                this.sounds.jump = () => this.playTone(400, 0.1, 'square');
                
                // Collect sound
                this.sounds.collect = () => {
                    this.playTone(800, 0.1, 'sine');
                    setTimeout(() => this.playTone(1000, 0.1, 'sine'), 50);
                };
                
                // Hit sound
                this.sounds.hit = () => this.playTone(200, 0.2, 'sawtooth');
                
                // Game over sound
                this.sounds.gameOver = () => {
                    this.playTone(300, 0.2, 'square');
                    setTimeout(() => this.playTone(200, 0.2, 'square'), 150);
                    setTimeout(() => this.playTone(100, 0.3, 'square'), 300);
                };
                
                // Achievement sound
                this.sounds.achievement = () => {
                    this.playTone(523, 0.1, 'sine'); // C
                    setTimeout(() => this.playTone(659, 0.1, 'sine'), 100); // E
                    setTimeout(() => this.playTone(784, 0.2, 'sine'), 200); // G
                };
            }

            playTone(frequency, duration, type = 'sine') {
                if (!this.enabled || !this.audioContext) return;
                
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                
                gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            }

            play(soundName) {
                if (this.sounds[soundName]) {
                    this.sounds[soundName]();
                }
            }

            toggleMute() {
                this.enabled = !this.enabled;
                return this.enabled;
            }
        }

        // Achievement System
        class AchievementManager {
            constructor() {
                this.achievements = [
                    { id: 'first_jump', name: 'İlk Zıplama', description: 'Oyunda ilk zıplamayı yap', unlocked: false, icon: '🦘' },
                    { id: 'score_10', name: 'Başlangıç', description: '10 skor ulaş', unlocked: false, icon: '🎯' },
                    { id: 'score_50', name: 'Usta', description: '50 skor ulaş', unlocked: false, icon: '⭐' },
                    { id: 'score_100', name: 'Efsane', description: '100 skor ulaş', unlocked: false, icon: '🏆' },
                    { id: 'combo_10', name: 'Combo Master', description: '10 combo yap', unlocked: false, icon: '🔥' },
                    { id: 'speed_demon', name: 'Hız Canavarı', description: 'Hız 3x ulaş', unlocked: false, icon: '⚡' },
                    { id: 'survivor', name: 'Hayatta Kalan', description: '60 saniye hayatta kal', unlocked: false, icon: '💪' },
                    { id: 'perfectionist', name: 'Mükemmeliyetçi', description: 'Hiç çarpmadan 20 skor yap', unlocked: false, icon: '💎' }
                ];
                this.loadAchievements();
            }

            loadAchievements() {
                const saved = localStorage.getItem('redRunnerAchievements');
                if (saved) {
                    const savedAchievements = JSON.parse(saved);
                    this.achievements.forEach(achievement => {
                        const saved = savedAchievements.find(a => a.id === achievement.id);
                        if (saved) {
                            achievement.unlocked = saved.unlocked;
                        }
                    });
                }
            }

            saveAchievements() {
                localStorage.setItem('redRunnerAchievements', JSON.stringify(this.achievements));
            }

            unlock(achievementId, soundManager) {
                const achievement = this.achievements.find(a => a.id === achievementId);
                if (achievement && !achievement.unlocked) {
                    achievement.unlocked = true;
                    this.saveAchievements();
                    this.showNotification(achievement);
                    if (soundManager) {
                        soundManager.play('achievement');
                    }
                    return true;
                }
                return false;
            }

            showNotification(achievement) {
                const notification = document.createElement('div');
                notification.className = 'achievement-notification';
                notification.innerHTML = `
                    <div class="achievement-content">
                        <div class="achievement-icon">${achievement.icon}</div>
                        <div class="achievement-info">
                            <div class="achievement-title">Başarı Kazanıldı!</div>
                            <div class="achievement-name">${achievement.name}</div>
                            <div class="achievement-description">${achievement.description}</div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.classList.add('show');
                }, 100);
                
                setTimeout(() => {
                    notification.classList.remove('show');
                    setTimeout(() => {
                        document.body.removeChild(notification);
                    }, 500);
                }, 3000);
            }

            getUnlockedCount() {
                return this.achievements.filter(a => a.unlocked).length;
            }

            getTotalCount() {
                return this.achievements.length;
            }
        }

        class OfflineRedRunnerGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.player = new OfflinePlayer(this.canvas.width, this.canvas.height);
                this.background = new OfflineBackground(this.canvas.width, this.canvas.height);
                this.obstacles = [];
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('redRunnerHighScore') || '0');
                this.gameSpeed = 5;
                this.gravity = 0.5;
                this.isRunning = false;
                this.isPaused = false;
                this.frameCount = 0;
                this.obstacleSpawnRate = 120;
                this.combo = 0;
                this.maxCombo = 0;
                this.survivalTime = 0;
                this.lastHitTime = 0;
                this.perfectRun = true;
                
                this.soundManager = new SoundManager();
                this.achievementManager = new AchievementManager();
                
                this.loadHighScore();
                this.setupEventListeners();
                this.createAchievementPanel();
                this.draw();
            }

            setupEventListeners() {
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (e.code === 'Space' && this.isRunning && !this.isPaused) {
                        e.preventDefault();
                        this.player.jump(this.soundManager);
                        
                        // First jump achievement
                        if (this.frameCount < 100) {
                            this.achievementManager.unlock('first_jump', this.soundManager);
                        }
                    }
                    
                    // Mute toggle with M key
                    if (e.code === 'KeyM') {
                        const enabled = this.soundManager.toggleMute();
                        this.showMuteNotification(enabled);
                    }
                });

                // Button controls
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('resetBtn').addEventListener('click', () => this.reset());
                document.getElementById('restartBtn').addEventListener('click', () => {
                    document.getElementById('gameOver').style.display = 'none';
                    this.reset();
                    this.start();
                });

                // Touch controls for mobile
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.isRunning && !this.isPaused) {
                        this.player.jump(this.soundManager);
                        
                        // First jump achievement
                        if (this.frameCount < 100) {
                            this.achievementManager.unlock('first_jump', this.soundManager);
                        }
                    }
                });
            }

            start() {
                if (!this.isRunning) {
                    this.isRunning = true;
                    this.isPaused = false;
                    this.gameLoop();
                }
            }

            togglePause() {
                if (this.isRunning) {
                    this.isPaused = !this.isPaused;
                    if (!this.isPaused) {
                        this.gameLoop();
                    }
                }
            }

            reset() {
                this.isRunning = false;
                this.isPaused = false;
                this.score = 0;
                this.gameSpeed = 5;
                this.frameCount = 0;
                this.obstacles = [];
                this.player = new OfflinePlayer(this.canvas.width, this.canvas.height);
                this.player.setGameActive(true);
                this.updateUI();
                this.draw();
            }

            spawnObstacle() {
                if (this.frameCount % this.obstacleSpawnRate === 0) {
                    this.obstacles.push(new OfflineObstacle(this.canvas.width, this.canvas.height, this.gameSpeed));
                    
                    // Increase difficulty
                    if (this.score > 0 && this.score % 10 === 0) {
                        this.gameSpeed += 0.5;
                        this.obstacleSpawnRate = Math.max(60, this.obstacleSpawnRate - 10);
                    }
                }
            }

            checkCollisions() {
                for (const obstacle of this.obstacles) {
                    if (this.player.x < obstacle.x + obstacle.width &&
                        this.player.x + this.player.width > obstacle.x &&
                        this.player.y < obstacle.y + obstacle.height &&
                        this.player.y + this.player.height > obstacle.y) {
                        return true;
                    }
                }
                return false;
            }

            update() {
                if (!this.isRunning || this.isPaused) return;

                this.frameCount++;
                this.survivalTime++;
                this.player.update(this.gravity, this.canvas.height);
                this.background.update(this.gameSpeed);
                this.spawnObstacle();

                // Update obstacles
                this.obstacles = this.obstacles.filter(obstacle => {
                    obstacle.update();
                    if (obstacle.isOffScreen()) {
                        this.score++;
                        this.combo++;
                        this.maxCombo = Math.max(this.maxCombo, this.combo);
                        
                        // Score achievements
                        if (this.score === 10) {
                            this.achievementManager.unlock('score_10', this.soundManager);
                        }
                        if (this.score === 50) {
                            this.achievementManager.unlock('score_50', this.soundManager);
                        }
                        if (this.score === 100) {
                            this.achievementManager.unlock('score_100', this.soundManager);
                        }
                        
                        // Combo achievements
                        if (this.combo === 10) {
                            this.achievementManager.unlock('combo_10', this.soundManager);
                        }
                        
                        // Speed achievements
                        if (this.gameSpeed >= 15) {
                            this.achievementManager.unlock('speed_demon', this.soundManager);
                        }
                        
                        // Perfectionist achievement
                        if (this.score === 20 && this.perfectRun) {
                            this.achievementManager.unlock('perfectionist', this.soundManager);
                        }
                        
                        // Collect sound effect
                        this.soundManager.play('collect');
                        return false;
                    }
                    return true;
                });

                // Check collisions
                if (this.checkCollisions()) {
                    this.combo = 0;
                    this.perfectRun = false;
                    this.soundManager.play('hit');
                    this.gameOver();
                }

                // Survivor achievement
                if (this.survivalTime === 3600) { // 60 seconds at 60fps
                    this.achievementManager.unlock('survivor', this.soundManager);
                }

                this.updateUI();
            }

            draw() {
                // Clear canvas
                this.ctx.fillStyle = '#000000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw background
                this.background.draw(this.ctx, this.canvas.width, this.canvas.height);

                // Draw ground
                const groundGradient = this.ctx.createLinearGradient(0, this.canvas.height - 50, 0, this.canvas.height);
                groundGradient.addColorStop(0, '#1a0505');
                groundGradient.addColorStop(1, '#0a0000');
                this.ctx.fillStyle = groundGradient;
                this.ctx.fillRect(0, this.canvas.height - 50, this.canvas.width, 50);

                // Draw ground line
                this.ctx.strokeStyle = '#ff4444';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(0, this.canvas.height - 50);
                this.ctx.lineTo(this.canvas.width, this.canvas.height - 50);
                this.ctx.stroke();

                // Draw obstacles
                this.obstacles.forEach(obstacle => obstacle.draw(this.ctx));

                // Draw player
                this.player.draw(this.ctx);

                // Draw score on canvas
                this.ctx.fillStyle = '#ff6666';
                this.ctx.font = 'bold 20px Arial';
                this.ctx.fillText(`Skor: ${this.score}`, 10, 30);
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
                document.getElementById('speed').textContent = (this.gameSpeed / 5).toFixed(1);
            }

            gameOver() {
                this.isRunning = false;
                this.player.setGameActive(false);
                
                // Play game over sound
                this.soundManager.play('gameOver');
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    this.saveHighScore();
                }

                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }

            createAchievementPanel() {
                const panel = document.createElement('div');
                panel.id = 'achievement-panel';
                panel.innerHTML = `
                    <div class="achievement-toggle" onclick="game.toggleAchievementPanel()">
                        🏆 Başarılar (${this.achievementManager.getUnlockedCount()}/${this.achievementManager.getTotalCount()})
                    </div>
                    <div class="achievement-list" id="achievement-list" style="display: none;">
                        ${this.achievementManager.achievements.map(achievement => `
                            <div class="achievement-item ${achievement.unlocked ? 'unlocked' : 'locked'}">
                                <div class="achievement-icon">${achievement.icon}</div>
                                <div class="achievement-info">
                                    <div class="achievement-name">${achievement.name}</div>
                                    <div class="achievement-description">${achievement.description}</div>
                                </div>
                                <div class="achievement-status">${achievement.unlocked ? '✅' : '🔒'}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                document.body.appendChild(panel);
            }

            toggleAchievementPanel() {
                const list = document.getElementById('achievement-list');
                if (list) {
                    list.style.display = list.style.display === 'none' ? 'block' : 'none';
                }
            }

            showMuteNotification(enabled) {
                const notification = document.createElement('div');
                notification.className = 'mute-notification';
                notification.textContent = enabled ? '🔊 Ses Açık' : '🔇 Ses Kapalı';
                notification.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 20px;
                    border-radius: 10px;
                    font-size: 18px;
                    z-index: 1000;
                    transition: opacity 0.3s;
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.opacity = '0';
                    setTimeout(() => {
                        document.body.removeChild(notification);
                    }, 300);
                }, 1000);
            }

            loadHighScore() {
                const saved = localStorage.getItem('redRunnerHighScore');
                if (saved) {
                    this.highScore = parseInt(saved);
                }
            }

            saveHighScore() {
                localStorage.setItem('redRunnerHighScore', this.highScore.toString());
            }

            gameLoop() {
                if (!this.isRunning || this.isPaused) return;

                this.update();
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.game = new OfflineRedRunnerGame();
        });
    </script>
</body>
</html>
